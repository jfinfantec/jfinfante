<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contacto — Juan Infante</title>
<link rel="stylesheet" href="https://use.typekit.net/utj7jfa.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,800;1,300;1,800&display=swap" rel="stylesheet">
<style>
  :root{--black:#0a0a0a;--blue:#172DE2;--green:#25D366;--white:#ffffff;}
  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{font-family:'Poppins',sans-serif;background:var(--black);color:var(--white);overflow-x:hidden;cursor:none;min-height:100vh;display:flex;flex-direction:column;}
  .cursor{width:10px;height:10px;background:var(--blue);border-radius:50%;position:fixed;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:transform 0.15s ease;}
  .cursor-ring{width:34px;height:34px;border:1px solid rgba(23,45,226,0.5);border-radius:50%;position:fixed;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width 0.3s,height 0.3s;}
  nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:20px 48px;display:flex;justify-content:space-between;align-items:center;backdrop-filter:blur(20px);background:rgba(10,10,10,0.85);border-bottom:1px solid rgba(255,255,255,0.05);}
  .nav-logo img{height:30px;width:auto;filter:brightness(0) invert(1);}
  .nav-links{display:flex;gap:36px;list-style:none;}
  .nav-links a{font-size:11px;font-weight:300;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.5);text-decoration:none;transition:color 0.3s;}
  .nav-links a:hover{color:var(--white);}
  .nav-cta{font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--black);background:var(--green);padding:10px 22px;border-radius:3px;text-decoration:none;transition:transform 0.2s,box-shadow 0.2s;}
  .nav-cta:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(37,211,102,0.4);}

  .contacto{flex:1;display:flex;flex-direction:column;justify-content:center;padding:120px 48px 80px;position:relative;}
  .contacto-bg{position:absolute;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at 50% 50%,rgba(23,45,226,0.08) 0%,transparent 60%);pointer-events:none;}

  .page-title{font-family:'widescreen',sans-serif;font-weight:900;font-size:clamp(52px,10vw,130px);line-height:0.9;letter-spacing:-4px;margin-bottom:60px;}

  .contacto-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px;max-width:700px;}
  .contacto-item{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);padding:36px 32px;transition:border-color 0.3s,background 0.3s;text-decoration:none;color:var(--white);}
  .contacto-item:hover{border-color:rgba(23,45,226,0.4);background:rgba(23,45,226,0.05);}
  .contacto-item.green:hover{border-color:rgba(37,211,102,0.4);background:rgba(37,211,102,0.05);}
  .contacto-tipo{font-size:10px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:12px;}
  .contacto-valor{font-size:16px;font-weight:800;}
  .contacto-item.green .contacto-valor{color:var(--green);}
  .contacto-proximamente{font-size:12px;font-weight:300;color:rgba(255,255,255,0.2);font-style:italic;margin-top:4px;}

  .contacto-memoji{position:absolute;right:48px;bottom:80px;height:200px;width:auto;opacity:0.8;}

  footer{padding:32px 48px;display:flex;justify-content:space-between;align-items:center;border-top:1px solid rgba(255,255,255,0.05);}
  footer p{font-size:11px;font-weight:300;color:rgba(255,255,255,0.2);}
  footer a{color:var(--blue);text-decoration:none;font-weight:800;}
  footer img{height:22px;width:auto;opacity:0.3;filter:brightness(0) invert(1);}

  @media(max-width:768px){
    nav{padding:18px 20px;} .nav-links{display:none;}
    .contacto{padding:100px 20px 60px;}
    .contacto-grid{grid-template-columns:1fr;}
    .contacto-memoji{display:none;}
    footer{flex-direction:column;gap:16px;padding:28px 20px;text-align:center;}
  }
</style>
</head>
<body>
<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>
<nav>
  <a href="index.html" class="nav-logo"><img src="LOGO_JUAN_INFANTE.svg" alt="Juan Infante"></a>
  <ul class="nav-links">
    <li><a href="video.html">Video</a></li>
    <li><a href="servicios.html">Servicios</a></li>
    <li><a href="quiensoy.html">Quién soy</a></li>
    <li><a href="contacto.html">Contacto</a></li>
  </ul>
  <a href="https://wa.link/1ikw5z" class="nav-cta" target="_blank">💬 Hablemos</a>
</nav>

<section class="contacto">
  <div class="contacto-bg"></div>
  <h1 class="page-title">HABLEMOS.</h1>
  <div class="contacto-grid">
    <a href="https://wa.link/1ikw5z" class="contacto-item green" target="_blank">
      <p class="contacto-tipo">WhatsApp</p>
      <p class="contacto-valor">💬 Escribir ahora</p>
    </a>
    <a href="mailto:juanfelipeinfantecarreno@gmail.com" class="contacto-item">
      <p class="contacto-tipo">Correo</p>
      <p class="contacto-valor">juanfelipeinfantecarreno@gmail.com</p>
    </a>
    <div class="contacto-item">
      <p class="contacto-tipo">Instagram</p>
      <p class="contacto-valor" style="color:rgba(255,255,255,0.25);">Por agregar</p>
      <p class="contacto-proximamente">Próximamente</p>
    </div>
    <div class="contacto-item">
      <p class="contacto-tipo">LinkedIn</p>
      <p class="contacto-valor" style="color:rgba(255,255,255,0.25);">Por agregar</p>
      <p class="contacto-proximamente">Próximamente</p>
    </div>
  </div>
  <img src="memoji-hola.webp" alt="" class="contacto-memoji">
</section>

<footer>
  <p>© 2026 Juan Infante · <a href="https://jfinfante.video">jfinfante.video</a></p>
  <img src="LOGO_JUAN_INFANTE.svg" alt="Juan Infante">
  <p>La Ceja, Antioquia · Colombia</p>
</footer>

<script>
  const cursor=document.getElementById('cursor'),ring=document.getElementById('cursorRing');
  let mx=0,my=0,rx=0,ry=0;
  document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cursor.style.left=mx+'px';cursor.style.top=my+'px';});
  function animateRing(){rx+=(mx-rx)*0.1;ry+=(my-ry)*0.1;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(animateRing);}
  animateRing();
  document.querySelectorAll('a,button').forEach(el=>{
    el.addEventListener('mouseenter',()=>{cursor.style.transform='translate(-50%,-50%) scale(2.5)';ring.style.width='54px';ring.style.height='54px';});
    el.addEventListener('mouseleave',()=>{cursor.style.transform='translate(-50%,-50%) scale(1)';ring.style.width='34px';ring.style.height='34px';});
  });
</script>
</body>
</html>
